services:
  server:
    build: ./server
    environment:
      PORT: "8080"
      ROOT: "/docker"
      API_KEY: "${API_KEY:?API_KEY required}"
      HOOKS_DIR: "/docker/.compose-manager/hooks"
      BACKUP_DIR: "/docker/.compose-manager/backups"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_ROOT:-/home/debian/docker}:/docker
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "${WEB_PORT:-3020}:8080"
    depends_on:
      - server
    restart: unless-stopped
